name: Publish to PyPI

on:
release:
types: [published]

workflow_dispatch:
inputs:
tag:
description: "Git tag to publish, for example v0.3.0"
required: true
type: string

permissions:
contents: read

env:
RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

jobs:
build:
name: Test and build package
runs-on: ubuntu-latest

```
permissions:
  contents: read

steps:
  - name: Checkout release tag
    uses: actions/checkout@v6
    with:
      ref: ${{ env.RELEASE_TAG }}

  - name: Set up Python
    uses: actions/setup-python@v6
    with:
      python-version: "3.12"

  - name: Install development and build tools
    run: |
      python -m pip install --upgrade pip
      python -m pip install build twine
      python -m pip install -e ".[dev]"

  - name: Run tests
    run: pytest

  - name: Verify package version matches tag
    run: |
      python - <<'PY'
      import os
      import tomllib

      tag = os.environ["RELEASE_TAG"]
      expected_version = tag[1:] if tag.startswith("v") else tag

      with open("pyproject.toml", "rb") as file:
          package_version = tomllib.load(file)["project"]["version"]

      if package_version != expected_version:
          raise SystemExit(
              f"Version mismatch: tag is {tag!r}, "
              f"but pyproject.toml contains {package_version!r}"
          )

      print(f"Publishing dupefinder {package_version}")
      PY

  - name: Build package
    run: python -m build

  - name: Check package metadata
    run: python -m twine check dist/*

  - name: Upload package distributions
    uses: actions/upload-artifact@v7
    with:
      name: python-package-distributions
      path: dist/
      if-no-files-found: error
```

publish:
name: Publish package to PyPI
needs: build
runs-on: ubuntu-latest

```
environment:
  name: pypi
  url: https://pypi.org/project/dupefinder/

permissions:
  id-token: write
  contents: read
  actions: read

steps:
  - name: Download package distributions
    uses: actions/download-artifact@v8
    with:
      name: python-package-distributions
      path: dist/

  - name: Publish package to PyPI
    uses: pypa/gh-action-pypi-publish@release/v1
```
