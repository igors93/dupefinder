name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pyright
        run: pyright

  tests:
    name: Tests — Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=dupefinder --cov-report=term-missing

  package:
    name: Build and validate package
    runs-on: ubuntu-latest
    needs: [quality, tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: pip install -e ".[dev]"

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Verify py.typed is in wheel
        run: python -m zipfile -l dist/*.whl | grep py.typed

      - name: Smoke test installed wheel
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/pip install --upgrade pip --quiet
          .venv-smoke/bin/pip install dist/*.whl --quiet
          .venv-smoke/bin/dupefinder --version
          .venv-smoke/bin/python -c "from dupefinder import scan, find_duplicates, DupeFinder, ScanOptions"
